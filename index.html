<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Gallery</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1e293b; border-radius: 15px; margin: 20px auto; overflow: hidden; border: 1px solid #334155; max-width: 400px; }
        img { width: 100%; display: block; height: auto; background: #000; }
        .info { padding: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>MY GALLERY</h1>
    <div id="gallery"></div>

    <script>
        async function loadGallery() {
            const gallery = document.getElementById('gallery');
            try {
                // Cash clear karne ke liye ek random number joda hai
                const res = await fetch('data.json?v=' + Math.random());
                const data = await res.json();
                
                gallery.innerHTML = ''; 
                data.forEach(item => {
                    gallery.innerHTML += `
                        <div class="card">
                            <img src="${item.file_name}" alt="Photo">
                            <div class="info">${item.title}</div>
                        </div>`;
                });
            } catch (e) {
                console.error("Error:", e);
            }
        }
        window.onload = loadGallery;
    </script>
</body>
</html>
