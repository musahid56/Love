<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swipe Gallery - Jaano Zara</title>
    <style>
        :root { --bg: #020617; --card: #1e293b; --primary: #3b82f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { background: var(--bg); color: white; padding: 10px; overflow-x: hidden; }
        h1 { text-align: center; margin: 15px 0; font-size: 20px; color: var(--primary); text-transform: uppercase; }

        /* Grid Layout */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Mobile pe 3 column */
            gap: 5px;
            max-width: 900px;
            margin: auto;
        }

        .thumb {
            aspect-ratio: 1/1;
            background: var(--card);
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
        }

        .thumb img { width: 100%; height: 100%; object-fit: cover; }

        /* Full Screen Overlay */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            touch-action: none; /* Scroll disable karne ke liye */
        }

        #full-img { 
            max-width: 100%; 
            max-height: 85vh; 
            object-fit: contain;
            transition: transform 0.2s ease;
        }

        /* Top Bar for Actions */
        .top-bar {
            position: absolute;
            top: 0; width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.5);
            z-index: 2001;
        }

        .btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }

        .close-btn { background: #ef4444; }

        #img-count { font-size: 14px; color: #94a3b8; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Jaano Zara Gallery</h1>

    <div class="grid-container" id="grid"></div>

    <div id="overlay">
        <div class="top-bar">
            <button class="btn close-btn" onclick="closeImg()">Wapas Jao</button>
            <a id="download-btn" href="#" download class="btn">Download</a>
        </div>

        <img id="full-img" src="">
        <div id="img-count"></div>
    </div>

    <script>
        let allItems = [];
        let currentIndex = 0;
        let touchStartX = 0;
        let touchEndX = 0;

        async function loadGallery() {
            const grid = document.getElementById('grid');
            try {
                const res = await fetch('data.json?v=' + Date.now());
                allItems = await res.json();
                
                grid.innerHTML = '';
                allItems.forEach((item, index) => {
                    const div = document.createElement('div');
                    div.className = 'thumb';
                    div.innerHTML = `<img src="${item.file_name}" onerror="this.parentElement.style.display='none'">`;
                    div.onclick = () => openImg(index);
                    grid.appendChild(div);
                });
            } catch (e) { console.log("JSON Error"); }
        }

        function openImg(index) {
            currentIndex = index;
            const item = allItems[index];
            const imgElement = document.getElementById('full-img');
            
            imgElement.src = item.file_name;
            document.getElementById('download-btn').href = item.file_name;
            document.getElementById('img-count').innerText = `${currentIndex + 1} / ${allItems.length}`;
            
            document.getElementById('overlay').style.display = 'flex';
        }

        function closeImg() {
            document.getElementById('overlay').style.display = 'none';
        }

        // SWIPE LOGIC SHURU
        const overlay = document.getElementById('overlay');

        overlay.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        });

        overlay.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            const swipeThreshold = 50; // Kitna swipe karne par change ho
            if (touchEndX < touchStartX - swipeThreshold) {
                // Left Swipe -> Next Image
                nextImg();
            }
            if (touchEndX > touchStartX + swipeThreshold) {
                // Right Swipe -> Previous Image
                prevImg();
            }
        }

        function nextImg() {
            if (currentIndex < allItems.length - 1) {
                openImg(currentIndex + 1);
            } else {
                openImg(0); // Khatam hone pe pehli pe jao
            }
        }

        function prevImg() {
            if (currentIndex > 0) {
                openImg(currentIndex - 1);
            } else {
                openImg(allItems.length - 1); // Shuruat mein ho toh aakhri pe jao
            }
        }

        window.onload = loadGallery;
    </script>
</body>
</html>
