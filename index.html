<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jaano Zara - Cloud Gallery</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --bg: #020617; --card: #1e293b; --primary: #3b82f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: white; padding: 10px; }
        
        h1 { text-align: center; margin: 15px 0; font-size: 22px; color: var(--primary); letter-spacing: 1px; }

        /* Upload Section */
        .upload-box { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            border: 2px dashed var(--primary); 
            text-align: center; 
        }
        input[type="file"] { margin: 10px 0; font-size: 14px; width: 100%; }
        .up-btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%; 
            font-size: 16px;
        }

        /* Gallery Grid */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
            max-width: 800px; 
            margin: auto;
        }
        .thumb { 
            aspect-ratio: 1/1; 
            background: #334155; 
            border-radius: 6px; 
            overflow: hidden; 
            cursor: pointer; 
        }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }

        /* Full View Overlay */
        #overlay { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); 
            display: none; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 1000; 
            touch-action: none; 
        }
        #full-img { max-width: 100%; max-height: 80vh; object-fit: contain; }
        .close-btn { 
            position: absolute; 
            top: 30px; right: 20px; 
            background: #ef4444; 
            color: white; 
            border: none; 
            padding: 10px 15px; 
            border-radius: 5px; 
            font-weight: bold;
        }
        #status { font-size: 13px; margin-top: 10px; color: #94a3b8; }
    </style>
</head>
<body>

    <h1>JAANO ZARA CLOUD</h1>

    <div class="upload-box">
        <input type="file" id="fileInput" accept="image/*">
        <button class="up-btn" onclick="uploadImg()">UPLOAD TO CLOUD</button>
        <p id="status">Photo select karo aur upload dabao</p>
    </div>

    <div class="grid" id="galleryGrid"></div>

    <div id="overlay" onclick="closeView()">
        <button class="close-btn">Close X</button>
        <img id="full-img" src="">
        <p style="margin-top:20px; font-size:12px; color:#64748b;">Tap anywhere to close</p>
    </div>

    <script>
        // --- TERI CONFIGURATION (FIXED) ---
        const firebaseConfig = {
            apiKey: "AIzaSyCfORsuk_DsN-66ODQL02E9VH6tBKpDYL4",
            authDomain: "my-gallary-5b358.firebaseapp.com",
            projectId: "my-gallary-5b358",
            storageBucket: "my-gallary-5b358.firebasestorage.app",
            messagingSenderId: "390106070814",
            appId: "1:390106070814:web:5e18540092f5fe1d34930f"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const storage = firebase.storage();
        const db = firebase.firestore();

        // --- 1. Photo Upload Karne Ka Function ---
        async function uploadImg() {
            const file = document.getElementById('fileInput').files[0];
            const status = document.getElementById('status');
            
            if (!file) {
                alert("Bhai, pehle photo toh select kar le!");
                return;
            }

            status.innerText = "⏳ Upload ho rahi hai... bhagna mat!";
            status.style.color = "#3b82f6";

            try {
                // Storage mein file bhejo
                const fileName = Date.now() + "_" + file.name;
                const storageRef = storage.ref('gallery/' + fileName);
                
                await storageRef.put(file);
                const downloadURL = await storageRef.getDownloadURL();

                // Database (Firestore) mein link save karo
                await db.collection('photos').add({
                    url: downloadURL,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                status.innerText = "✅ Dhamaka! Photo upload ho gayi.";
                status.style.color = "#22c55e";
                
                // 2 second baad refresh taaki nayi photo dikhe
                setTimeout(() => { location.reload(); }, 2000);

            } catch (error) {
                console.error(error);
                status.innerText = "❌ Error! Rules check kar Firebase mein.";
                status.style.color = "#ef4444";
                alert("Kuch gadbad hui! Check if Storage/Firestore is in 'Test Mode'");
            }
        }

        // --- 2. Photos Load Karne Ka Function ---
        async function loadGallery() {
            const grid = document.getElementById('galleryGrid');
            
            try {
                const snapshot = await db.collection('photos').orderBy('createdAt', 'desc').get();
                
                if (snapshot.empty) {
                    grid.innerHTML = "<p style='grid-column: 1/4;'>Abhi koi photo nahi hai bhai.</p>";
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const thumbDiv = document.createElement('div');
                    thumbDiv.className = 'thumb';
                    thumbDiv.innerHTML = `<img src="${data.url}" loading="lazy">`;
                    
                    thumbDiv.onclick = () => {
                        document.getElementById('full-img').src = data.url;
                        document.getElementById('overlay').style.display = 'flex';
                    };
                    
                    grid.appendChild(thumbDiv);
                });
            } catch (err) {
                console.log("Load error:", err);
            }
        }

        function closeView() {
            document.getElementById('overlay').style.display = 'none';
        }

        // Run on Page Load
        window.onload = loadGallery;
    </script>
</body>
</html>
